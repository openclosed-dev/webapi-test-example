services:
  devcontainer:
    build:
      context: .
      args:
        - USERNAME=${USER:?err}
        - USER_UID=${COMPOSE_USER_ID:-1000}
        - USER_GID=${COMPOSE_GROUP_ID:-1000}
        - GRADLE_VERSION=9.6.0
    environment:
      - API_URL=http://localhost:8080
      - DB_URL=jdbc:postgresql://db.example.org/test
      - PGHOST=db.example.org
      - PGDATABASE=test
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
    command: sleep infinity
    volumes:
      - type: bind
        source: ../
        target: /home/$USER/webapi-test-example
        consistency: consistent
      - type: volume
        source: gradle
        target: /home/${USER}/.gradle/caches
  postgres:
    image: postgres:18.4-trixie
    hostname: db.example.org
    environment:
      - POSTGRES_DB=test
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    shm_size: 256m
    volumes:
      - type: bind
        source: ./initdb.d
        target: /docker-entrypoint-initdb.d
      - type: volume
        source: postgresql
        target: /var/lib/postgresql

volumes:
  gradle:
  postgresql:
